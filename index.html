<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
margin-top:150px;
overflow:hidden;
}

h1{
font-size:40px;
color:pink;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px pink;}
to{ text-shadow:0 0 30px red;}
}

.heart{
position:absolute;
color:red;
font-size:25px;
animation: fall 5s linear infinite;
}

@keyframes fall{
0%{ transform:translateY(-100px);}
100%{ transform:translateY(100vh);}
}

button{
padding:12px 25px;
font-size:20px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:pink;
}
</style>

</head>

<body>

<h1>Hi ❤️</h1>

<p>You are very special to me...</p>

<p>I have one question for you 💖</p>

<h2>Will you be mine? 💍</h2>

<button onclick="yes()">Yes 💖</button>

<script>

function yes(){
alert("You just made Gokul the happiest person ❤️");
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*2)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
