 <!DOCTYPE html>
<html>
<head>
<title>Gokul AI Tools</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🤖 Gokul AI Tools</h1>
<p>Free AI tools for everyone</p>
</header>

<div class="container">

<div class="card">
<h3>Caption Generator</h3>
<button onclick="showCaption()">Open</button>
</div>

<div class="card">
<h3>Resume Generator</h3>
<button onclick="showResume()">Open</button>
</div>

<div class="card">
<h3>Grammar Corrector</h3>
<button onclick="showGrammar()">Open</button>
</div>

<div class="card">
<h3>Text to Image</h3>
<button onclick="showImage()">Open</button>
</div>

</div>

<div id="tool"></div>
<div id="result"></div>

<script>

function showCaption(){
document.getElementById("tool").innerHTML=
'<input id="topic" placeholder="Enter topic"><br><button onclick="caption()">Generate</button>';
}

function caption(){
let topic=document.getElementById("topic").value;

let captions=[
topic+" vibes only ✨",
"Life is better with "+topic,
topic+" makes everything special"
];

let random=captions[Math.floor(Math.random()*captions.length)];

document.getElementById("result").innerText=random;
}

function showResume(){
document.getElementById("tool").innerHTML=
'<input id="name" placeholder="Enter name"><br><input id="skill" placeholder="Enter skill"><br><button onclick="resume()">Generate</button>';
}

function resume(){

let name=document.getElementById("name").value;
let skill=document.getElementById("skill").value;

document.getElementById("result").innerText=
"Name: "+name+" | Skills: "+skill;

}

function showGrammar(){
document.getElementById("tool").innerHTML=
'<textarea id="text" placeholder="Enter sentence"></textarea><br><button onclick="grammar()">Correct</button>';
}

function grammar(){

let text=document.getElementById("text").value;

document.getElementById("result").innerText="Corrected: "+text;

}

function showImage(){
document.getElementById("tool").innerHTML=
'<button onclick="image()">Generate Image</button>';
}

function image(){

document.getElementById("result").innerHTML=
"<img src='https://picsum.photos/300'>";

}

</script>

</body>
</html>
